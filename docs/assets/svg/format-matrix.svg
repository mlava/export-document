<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" width="100%">
  <rect width="750" height="420" fill="#F8FAFC"/>

  <text x="375" y="50" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="22" font-weight="600" fill="#0F172A">Nine formats supported: four round-trip cleanly</text>
  <text x="375" y="78" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748B">Export covers 7 formats. Import covers 6. Four overlap and round-trip both ways.</text>

  <text x="170" y="130" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="13" font-weight="500" fill="#334155" letter-spacing="0.08em">EXPORT ONLY</text>
  <text x="375" y="130" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="13" font-weight="500" fill="#2563EB" letter-spacing="0.08em">ROUND-TRIP</text>
  <text x="580" y="130" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="13" font-weight="500" fill="#334155" letter-spacing="0.08em">IMPORT ONLY</text>

  <line x1="90" y1="145" x2="250" y2="145" stroke="#E2E8F0" stroke-width="1.5"/>
  <line x1="290" y1="145" x2="460" y2="145" stroke="#2563EB" stroke-width="2"/>
  <line x1="500" y1="145" x2="660" y2="145" stroke="#E2E8F0" stroke-width="1.5"/>

  <rect x="100" y="170" width="140" height="38" rx="2" ry="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="100" y="218" width="140" height="38" rx="2" ry="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="100" y="266" width="140" height="38" rx="2" ry="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="170" y="195" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="500" fill="#0F172A">pdf</text>
  <text x="170" y="243" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="500" fill="#0F172A">gfm</text>
  <text x="170" y="291" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="15" font-weight="500" fill="#0F172A">opendocument</text>

  <rect x="305" y="170" width="140" height="38" rx="2" ry="2" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <rect x="305" y="218" width="140" height="38" rx="2" ry="2" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <rect x="305" y="266" width="140" height="38" rx="2" ry="2" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <rect x="305" y="314" width="140" height="38" rx="2" ry="2" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="600" fill="#0F172A">docx</text>
  <text x="375" y="243" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="600" fill="#0F172A">rtf</text>
  <text x="375" y="291" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="600" fill="#0F172A">epub</text>
  <text x="375" y="339" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="600" fill="#0F172A">md</text>

  <rect x="510" y="170" width="140" height="38" rx="2" ry="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="510" y="218" width="140" height="38" rx="2" ry="2" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="580" y="195" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="500" fill="#0F172A">odt</text>
  <text x="580" y="243" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="16" font-weight="500" fill="#0F172A">html</text>

  <text x="375" y="395" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748B">Conversion runs on a Heroku-hosted Pandoc and TinyTeX server</text>
