<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" width="100%">
  <rect width="750" height="420" fill="#F8FAFC"/>

  <text x="375" y="48" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="22" font-weight="600" fill="#0F172A">Both directions route through a Pandoc conversion server</text>
  <text x="375" y="74" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748B">Export sends markdown; import sends file bytes. Conversion always happens server-side.</text>

  <text x="50" y="130" font-family="'Fira Code', ui-monospace, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.1em">EXPORT</text>
  <line x1="50" y1="140" x2="700" y2="140" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="60" y="165" width="160" height="60" rx="3" ry="3" fill="#FFFFFF" stroke="#334155" stroke-width="1.5"/>
  <rect x="300" y="165" width="160" height="60" rx="3" ry="3" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <rect x="540" y="165" width="160" height="60" rx="3" ry="3" fill="#FFFFFF" stroke="#334155" stroke-width="1.5"/>

  <line x1="225" y1="195" x2="294" y2="195" stroke="#334155" stroke-width="1.5"/>
  <path d="M 294,189 L 302,195 L 294,201 Z" fill="#334155"/>
  <line x1="465" y1="195" x2="534" y2="195" stroke="#334155" stroke-width="1.5"/>
  <path d="M 534,189 L 542,195 L 534,201 Z" fill="#334155"/>

  <text x="140" y="192" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Roam page</text>
  <text x="140" y="212" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">serialised to gfm</text>
  <text x="380" y="192" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Pandoc server</text>
  <text x="380" y="212" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">Heroku conversion</text>
  <text x="620" y="192" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Document file</text>
  <text x="620" y="212" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">downloaded locally</text>

  <text x="50" y="270" font-family="'Fira Code', ui-monospace, monospace" font-size="13" font-weight="600" fill="#2563EB" letter-spacing="0.1em">IMPORT</text>
  <line x1="50" y1="280" x2="700" y2="280" stroke="#E2E8F0" stroke-width="1"/>

  <rect x="60" y="305" width="160" height="60" rx="3" ry="3" fill="#FFFFFF" stroke="#334155" stroke-width="1.5"/>
  <rect x="300" y="305" width="160" height="60" rx="3" ry="3" fill="#F1F5F9" stroke="#2563EB" stroke-width="2"/>
  <rect x="540" y="305" width="160" height="60" rx="3" ry="3" fill="#FFFFFF" stroke="#334155" stroke-width="1.5"/>

  <line x1="225" y1="335" x2="294" y2="335" stroke="#334155" stroke-width="1.5"/>
  <path d="M 294,329 L 302,335 L 294,341 Z" fill="#334155"/>
  <line x1="465" y1="335" x2="534" y2="335" stroke="#334155" stroke-width="1.5"/>
  <path d="M 534,329 L 542,335 L 534,341 Z" fill="#334155"/>

  <text x="140" y="332" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Document file</text>
  <text x="140" y="352" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">picked from disk</text>
  <text x="380" y="332" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Pandoc server</text>
  <text x="380" y="352" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">file to markdown</text>
  <text x="620" y="332" text-anchor="middle" font-family="'Fira Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Roam page</text>
  <text x="620" y="352" text-anchor="middle" font-family="'Fira Code', ui-monospace, monospace" font-size="11" font-weight="400" fill="#64748B">nested block tree</text>
</svg>
